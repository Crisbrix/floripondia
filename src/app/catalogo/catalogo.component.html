<!--Encabezado del catalogo-->
<section class="cata-header">
  <h1>Catálogo</h1>
  <p>Encuentra tu próximo favorito</p>
</section>

<!--Cuerpo: sidebar + grid de productos-->
<div class="cata-body">
  <!--Filtros de categoria-->
  <aside class="sidebar">
    <h3>Categorías</h3>
    @for (cat of categories; track cat.key) {
      <button
        class="filter-btn"
        [class.active]="activeFilter === cat.key"
        (click)="filterBy(cat.key)"
      >
        <span class="dot" [style.background]="cat.color"></span>
        {{ cat.name }}
      </button>
    }
  </aside>

  <!--Grid de productos filtrados-->
  <div class="grid">
    @for (product of filtered; track product.id) {
      <div class="card">
        <div class="card-img" [style.background]="'url(' + product.image + '), ' + product.color" [style.backgroundSize]="'cover'" [style.backgroundPosition]="'center'" [style.backgroundBlendMode]="'overlay'"></div>
        <div class="card-body">
          <h4>{{ product.name }}</h4>
          <span class="stock-badge">Stock: {{ product.stock }}</span>
        </div>
      </div>
    }
  </div>
</div>

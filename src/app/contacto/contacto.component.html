<!--Hero de contacto-->
<section class="contact-hero">
  <h1>Contacto</h1>
  <p>Estamos a un mensaje de distancia</p>
</section>

<!--Tarjetas de contacto-->
<section class="contact-cards">
  <a href="https://wa.me/573134834606" target="_blank" class="contact-card" style="background: #FFF9C4">
    <span class="contact-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </span>
    <h3>WhatsApp</h3>
    <span class="contact-link">313 483 4606</span>
  </a>

  <a href="https://instagram.com/floripondia_boutique" target="_blank" class="contact-card" style="background: #FCE4EC">
    <span class="contact-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </span>
    <h3>Instagram</h3>
    <span class="contact-link">&#64;floripondia_boutique</span>
  </a>

  <a href="mailto:hola&#64;floripondia.co" target="_blank" class="contact-card" style="background: #E3F2FD">
    <span class="contact-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </span>
    <h3>Email</h3>
    <span class="contact-link">hola&#64;floripondia.co</span>
  </a>
</section>

<!--Formulario de contacto-->
<section class="contact-form-section">
  <div class="form-card">
    <h2>Escríbenos</h2>
    <p>Cuéntanos qué buscas o si tienes alguna pregunta</p>
    <div class="contact-form">
      <input type="text" placeholder="Tu nombre" [(ngModel)]="nombre" />
      <input type="email" placeholder="Tu correo" [(ngModel)]="correo" />
      <textarea rows="4" placeholder="Escribe tu mensaje..." [(ngModel)]="mensaje"></textarea>
      <button type="button" (click)="enviarWhatsApp()">Enviar mensaje</button>
    </div>
  </div>
</section>
